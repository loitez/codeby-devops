---
- name: Download WordPress
  ansible.builtin.get_url:
    url: https://wordpress.org/latest.tar.gz
    dest: /tmp/wordpress.tar.gz
    mode: '0644'

- name: Extract WordPress
  ansible.builtin.unarchive:
    src: /tmp/wordpress.tar.gz
    dest: /tmp/
    remote_src: yes

# === ИСПРАВЛЕННАЯ ЗАДАЧА КОПИРОВАНИЯ ===
- name: Copy WordPress files to Document Root
  ansible.builtin.shell: |
    cp -r /tmp/wordpress/* /var/www/html/
    cp -r /tmp/wordpress/.* /var/www/html/ 2>/dev/null || true
    chown -R {{ 'apache' if ansible_os_family == 'RedHat' else 'www-data' }}:{{ 'apache' if ansible_os_family == 'RedHat' else 'www-data' }} /var/www/html/
    chmod -R 755 /var/www/html/
  become: true

- name: Remove temporary WordPress archive
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/wordpress.tar.gz
    - /tmp/wordpress
# ==========================================

- name: Create wp-config.php
  ansible.builtin.template:
    src: wp-config.php.j2
    dest: /var/www/html/wp-config.php
    owner: "{{ 'apache' if ansible_os_family == 'RedHat' else 'www-data' }}"
    group: "{{ 'apache' if ansible_os_family == 'RedHat' else 'www-data' }}"
    mode: '0644'