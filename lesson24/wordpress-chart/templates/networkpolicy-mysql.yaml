{{- if .Values.mysql.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wordpress-stack.fullname" . }}-mysql-netpol
  labels:
    {{- include "wordpress-stack.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "wordpress-stack.mysqlLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "wordpress-stack.wordpressLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mysql.service.port }}
  {{- end }}