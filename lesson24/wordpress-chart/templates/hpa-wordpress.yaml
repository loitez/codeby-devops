{{- if and .Values.wordpress.enabled .Values.wordpress.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "wordpress-stack.fullname" . }}-wordpress-hpa
  labels:
    {{- include "wordpress-stack.wordpressLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "wordpress-stack.fullname" . }}-wordpress
  minReplicas: {{ .Values.wordpress.hpa.minReplicas }}
  maxReplicas: {{ .Values.wordpress.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.wordpress.hpa.targetCPUUtilization }}
  {{- end }}