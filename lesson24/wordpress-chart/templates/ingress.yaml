{{- if and .Values.wordpress.enabled .Values.wordpress.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wordpress-stack.fullname" . }}-wordpress-ingress
  labels:
    {{- include "wordpress-stack.wordpressLabels" . | nindent 4 }}
  {{- with .Values.wordpress.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.wordpress.ingress.className }}
  {{- if .Values.wordpress.ingress.tls }}
  tls:
    {{- range .Values.wordpress.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.wordpress.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "wordpress-stack.fullname" . }}-wordpress
                port:
                  name: http
  {{- end }}