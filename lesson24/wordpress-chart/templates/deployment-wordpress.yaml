{{- if .Values.wordpress.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordpress-stack.fullname" . }}-wordpress
  labels:
    {{- include "wordpress-stack.wordpressLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.wordpress.replicas }}
  selector:
    matchLabels:
      {{- include "wordpress-stack.wordpressLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wordpress-stack.wordpressLabels" . | nindent 8 }}
    spec:
      containers:
        - name: wordpress
          image: "{{ .Values.wordpress.image.repository }}:{{ .Values.wordpress.image.tag }}"
          imagePullPolicy: {{ .Values.wordpress.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.wordpress.service.port }}
              name: http
          env:
            - name: WORDPRESS_DB_HOST
              value: "{{ include "wordpress-stack.fullname" . }}-mysql:{{ .Values.mysql.service.port }}"
            - name: WORDPRESS_DB_NAME
              value: {{ .Values.mysql.credentials.database }}
            - name: WORDPRESS_DB_USER
              value: {{ .Values.mysql.credentials.user }}
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress-stack.fullname" . }}-db-credentials
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: {{ .Values.wordpress.resources.requests.cpu }}
              memory: {{ .Values.wordpress.resources.requests.memory }}
            limits:
              cpu: {{ .Values.wordpress.resources.limits.cpu }}
              memory: {{ .Values.wordpress.resources.limits.memory }}
          volumeMounts:
            - name: wp-data
              mountPath: /var/www/html
      volumes:
        - name: wp-data
          persistentVolumeClaim:
            claimName: {{ include "wordpress-stack.fullname" . }}-wp-data
  {{- end }}