
{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wordpress-stack.fullname" . }}-mysql
  labels:
    {{- include "wordpress-stack.mysqlLabels" . | nindent 4 }}
spec:
  type: {{ .Values.mysql.service.type }}
  ports:
    - port: {{ .Values.mysql.service.port }}
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "wordpress-stack.mysqlLabels" . | nindent 4 }}
{{- end }}

